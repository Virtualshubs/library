<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>3D Twins Scene</title>
  <script src="sdk.js"></script>
</head>
<body>
  <!-- Contenedor donde se cargará la escena -->
  <div id="vh-container" style="width:100%; height:100vh;"></div>

  <script>
    (function(){
      // 1️⃣ Obtener el Base64 desde la URL de este index
      const urlParams = new URLSearchParams(window.location.search);
      let base64Scene = '';
      if(urlParams.has('scene')) {
        base64Scene = urlParams.get('scene');
      }

      if(!base64Scene) {
        console.error("No se ha proporcionado escena en la URL");
        return;
      }

      // 2️⃣ Inicializar SDK con el contenedor y la escena
      VH.init({
        containerId: 'vh-container',
        scene: base64Scene
      });

      // 3️⃣ Opcional: actualizar la URL en el navegador para que sea “limpia”
      history.replaceState({}, '', `?scene=${base64Scene}`);
    })();
  </script>
</body>
</html>
